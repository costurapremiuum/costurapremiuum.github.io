```html
<!-- Cookies -->
<div id="cookie-banner"
style="display:none; position:fixed; bottom:0; left:0; width:100%; background:#111; color:white; padding:15px; text-align:center; font-size:14px; z-index:9999;">

Usamos cookies y tecnologías de seguimiento para mejorar tu experiencia y analizar el tráfico del sitio.

<button id="cookie-btn"
style="margin-left:10px;padding:8px 15px;border:none;background:#fff;color:#111;cursor:pointer;border-radius:6px;">

Aceptar

</button>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

  const banner = document.getElementById("cookie-banner");
  const btn = document.getElementById("cookie-btn");

  const accepted = localStorage.getItem("cookiesAccepted");

  if (!accepted) {
    banner.style.display = "block";
  }

  btn.addEventListener("click", function () {
    localStorage.setItem("cookiesAccepted", "true");
    banner.style.display = "none";
  });

});

</script>
```
