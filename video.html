<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Video - Costurando Ando</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:#fffafc;
  color:#2b2333;
}

.page{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#ff66b2;
  font-size:1.6rem;
}

.video-container{
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  margin:20px 0;
}

iframe{
  width:100%;
  height:480px;
  border:none;
}

@media(max-width:600px){
  iframe{height:240px;}
}

.form-section{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:30px;
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
}

@media(max-width:800px){
  .form-section{grid-template-columns:1fr;}
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:999px;
  border:1px solid #e2d6f0;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#ff66b2,#c6b7ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  transform:scale(1.02);
}

.privacy{
  font-size:.75rem;
  color:#7a6f80;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="page">

<h1>🎬 Mira el video y recibe tu libro gratis</h1>

<!-- VIDEO -->
<div class="video-container">
<iframe src="https://drive.google.com/file/d/1PbdrRkbfcbTw8Picqk0VY4d1_xqeYZdh/preview" allow="autoplay"></iframe>
</div>

<!-- FORM -->
<div class="form-section">

<div>
<h2 style="color:#ff66b2;">📘 Libro gratis de costura</h2>
<p>Déjame tus datos y te lo envío directo a tu correo 💕</p>

<form id="costuraForm">
  <input type="text" name="nombre" placeholder="Tu nombre" required>
  <input type="email" name="email" placeholder="Tu correo" required>
  <input type="text" name="whatsapp" placeholder="WhatsApp (opcional)">
  <button type="submit">Recibir mi libro 🎁</button>
</form>

<p class="privacy">
Tu información está segura y solo se usará para enviarte el material.
</p>
</div>

<div>
<img src="https://images.unsplash.com/photo-1609883242644-9e310d9c35b9?auto=format&fit=crop&w=800&q=80" width="100%" style="border-radius:18px;">
</div>

</div>

</div>

<script>
const form=document.getElementById("costuraForm");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const data={
    nombre:form.nombre.value,
    email:form.email.value,
    whatsapp:form.whatsapp.value
  };

  await fetch("https://script.google.com/macros/s/AKfycbzxoge_JA8SxrP2mE9cLa4CdLJNlzl1PfWNmIbBmQEQFq_kVKEXDUCDpPluge9vcsoeFw/exec",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  window.location.href="https://corteyconfeccion.online/gracias.html";
});
</script>

</body>
</html>
